<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Prediction Bot Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--primary); }

        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-value { font-size: 28px; font-weight: 700; margin-top: 5px; }
        .stat-label { color: var(--text-dim); font-size: 14px; }

        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 30px;
            height: 500px;
        }

        .trades-table {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #334155;
            text-align: left;
            padding: 12px 20px;
            font-size: 14px;
            color: var(--text-dim);
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid #334155;
        }

        .pnl-pos { color: var(--success); }
        .pnl-neg { color: var(--danger); }

        #status-indicator {
            font-size: 14px;
            padding: 5px 12px;
            border-radius: 20px;
            background: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gold Trading Bot Dashboard</h1>
            <div>
                <span id="status-indicator">Idle</span>
                <button id="start-btn" class="btn" onclick="startBacktest()">Run Backtest</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Profit</div>
                <div id="pnl-val" class="stat-value">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div id="win-rate-val" class="stat-value">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Trades Placed</div>
                <div id="trades-val" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Accuracy</div>
                <div id="acc-val" class="stat-value">60.6%</div>
            </div>
        </div>

        <div class="chart-container" id="equity-chart"></div>

        <div class="trades-table">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>PnL ($)</th>
                        <th>Balance ($)</th>
                    </tr>
                </thead>
                <tbody id="trades-body">
                    <!-- Trades populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let pollInterval;

        async function startBacktest() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('status-indicator').innerText = 'Running...';
            
            const res = await fetch('/api/start_backtest', { method: 'POST' });
            pollInterval = setInterval(fetchResults, 2000);
        }

        async function fetchResults() {
            const res = await fetch('/api/results');
            const result = await res.json();
            
            document.getElementById('status-indicator').innerText = result.status.charAt(0).toUpperCase() + result.status.slice(1);

            if (result.status === 'finished') {
                clearInterval(pollInterval);
                document.getElementById('start-btn').disabled = false;
                updateUI(result.data);
            }
        }

        function updateUI(data) {
            document.getElementById('pnl-val').innerText = `$${data.total_pnl}`;
            document.getElementById('pnl-val').className = 'stat-value ' + (data.total_pnl >= 0 ? 'pnl-pos' : 'pnl-neg');
            document.getElementById('win-rate-val').innerText = `${data.win_rate}%`;
            document.getElementById('trades-val').innerText = data.total_trades;

            // Update Table
            const tbody = document.getElementById('trades-body');
            tbody.innerHTML = '';
            data.trades.reverse().forEach(t => {
                const row = `<tr>
                    <td>${t.time}</td>
                    <td class="${t.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${t.pnl >= 0 ? '+' : ''}${t.pnl}</td>
                    <td>$${t.balance}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            // Update Chart
            const trace1 = {
                x: data.trades.map((_, i) => i),
                y: data.equity_curve,
                type: 'scatter',
                mode: 'lines+markers',
                name: 'Equity',
                line: { color: '#fbbf24', width: 3 },
                marker: { color: '#fbbf24', size: 6 }
            };

            const layout = {
                title: 'Equity Curve',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#f8fafc' },
                xaxis: { title: 'Number of Trades', gridcolor: '#334155' },
                yaxis: { title: 'Balance ($)', gridcolor: '#334155' }
            };

            Plotly.newPlot('equity-chart', [trace1], layout);
        }
    </script>
</body>
</html>
